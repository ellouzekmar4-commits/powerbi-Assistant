<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Assistant IA</title>
<style>
  html, body { margin:0; padding:0; height:100%; overflow:hidden; }
  #frame { position:fixed; inset:0; width:100%; height:100%; border:0; }
  #loading { position:fixed; inset:0; display:flex; align-items:center; justify-content:center; color:#888; font-family:'Segoe UI', sans-serif; font-size:13px; }
</style>
</head>
<body>
  <div id="loading">Chargement...</div>
  <iframe id="frame" style="display:none"></iframe>
  <script>
    fetch('url.txt?t=' + Date.now())
      .then(function (r) { return r.text(); })
      .then(function (u) {
        u = u.trim().replace(/\/+$/, '');
        var f = document.getElementById('frame');
        f.src = u + '/chatui';
        f.style.display = 'block';
        document.getElementById('loading').style.display = 'none';
      })
      .catch(function () {
        document.getElementById('loading').textContent = 'Service indisponible.';
      });
  </script>
</body>
</html>
