<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard Clinique</title>
<style>
  html, body { margin:0; padding:0; height:100%; overflow:hidden; font-family:'Segoe UI', sans-serif; background:#f4f4f4; }
  #frame { position:fixed; inset:0; width:100%; height:100%; border:0; }
  #loading { position:fixed; inset:0; display:flex; align-items:center; justify-content:center; flex-direction:column; color:#555; }
  .spin { width:40px; height:40px; border:4px solid #ddd; border-top-color:#48b096; border-radius:50%; animation:s 1s linear infinite; margin-bottom:14px; }
  @keyframes s { to { transform:rotate(360deg); } }
</style>
</head>
<body>
  <div id="loading"><div class="spin"></div>Connexion au dashboard...</div>
  <iframe id="frame" style="display:none" allow="microphone"></iframe>
  <script>
    fetch('url.txt?t=' + Date.now())
      .then(function (r) { return r.text(); })
      .then(function (u) {
        u = u.trim().replace(/\/+$/, '');
        var f = document.getElementById('frame');
        f.src = u + '/portal';
        f.style.display = 'block';
        document.getElementById('loading').style.display = 'none';
      })
      .catch(function () {
        document.getElementById('loading').innerHTML = 'Service momentanement indisponible. Reessayez dans quelques minutes.';
      });
  </script>
</body>
</html>
